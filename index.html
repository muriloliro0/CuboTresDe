<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Cube - Precision Gap</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="vista-container">
        <div class="aurora"></div>
        <div class="glass-overlay"></div>
        
        <div class="scene">
            <div class="cube-cluster" id="mainCube"></div>
            <div class="floor-reflection"></div>
        </div>
    </div>

    <script>
        const cluster = document.getElementById('mainCube');
        const cubeSize = 50; 
        const gap = 65; // 50px do cubo + 15px de fresta (aprox. 1cm visual)

        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                for (let z = -1; z <= 1; z++) {
                    const miniCube = document.createElement('div');
                    miniCube.className = 'mini-cube';
                    miniCube.style.transform = `translate3d(${x * gap}px, ${y * gap}px, ${z * gap}px)`;
                    
                    ['front', 'back', 'left', 'right', 'top', 'bottom'].forEach(f => {
                        const face = document.createElement('div');
                        face.className = `face ${f}`;
                        miniCube.appendChild(face);
                    });
                    cluster.appendChild(miniCube);
                }
            }
        }

        let isDragging = false, rotateX = -30, rotateY = -45, velX = 0, velY = 0, lastX, lastY;

        document.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX; lastY = e.clientY;
            velX = 0; velY = 0;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            velY = (e.clientX - lastX) * 0.4;
            velX = (e.clientY - lastY) * 0.4;
            lastX = e.clientX; lastY = e.clientY;
        });

        document.addEventListener('mouseup', () => isDragging = false);

        function render() {
            if (!isDragging) { velX *= 0.95; velY *= 0.95; }
            rotateX -= velX; rotateY += velY;
            cluster.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
